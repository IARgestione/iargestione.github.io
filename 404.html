<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IAR</title>
    <!-- Favicon inline (evita el 404 de favicon.ico) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        /* =========================================================
           VARIABLES Y RESET
           ========================================================= */
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-glass: rgba(26, 32, 53, 0.85);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            --gradient-2: linear-gradient(135deg, #3b82f6, #6366f1);
            --border-subtle: rgba(148, 163, 184, 0.08);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.3);
            --error-text: #fca5a5;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            color: var(--text-primary);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overflow: hidden;
        }

        /* =========================================================
           LOADER
           ========================================================= */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .spinner-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(99, 102, 241, 0.15);
            border-top-color: var(--accent-light);
            animation: spin 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* =========================================================
           REPRODUCTOR — CONTENEDOR PRINCIPAL
           ========================================================= */
        #player-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            position: relative;
        }

        /* ─── Barra superior glassmorphism ─── */
        .top-bar {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(180deg, rgba(10, 14, 26, 0.92) 0%, rgba(10, 14, 26, 0.4) 70%, transparent 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            text-align: center;
        }

        .top-bar h1 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
            letter-spacing: 0.01em;
            line-height: 1.5;
            padding: 0 12px;
            word-break: break-word;
        }

        /* ─── Wrapper del contenido multimedia ─── */
        .media-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* =========================================================
           🎵 AUDIO PLAYER — Diseño premium card-style
           ========================================================= */
        .audio-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 40px 32px;
            width: 92%;
            max-width: 440px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px var(--accent-glow);
        }

        .audio-art {
            width: 140px;
            height: 140px;
            background: var(--gradient-1);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .audio-art::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            border-radius: 28px;
        }

        .audio-art svg {
            width: 60px;
            height: 60px;
            fill: white;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
            z-index: 1;
        }

        /* Animación de ondas detrás del icono */
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            border: 2px solid rgba(255,255,255,0.15);
            animation: pulse-expand 2.5s ease-out infinite;
        }

        .pulse-ring:nth-child(2) { animation-delay: 0.8s; }

        @keyframes pulse-expand {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .audio-info {
            text-align: center;
        }

        .audio-info .label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-light);
            margin-bottom: 8px;
        }

        .audio-info .name {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 340px;
            word-break: break-word;
        }

        audio {
            width: 100%;
            max-width: 380px;
            height: 48px;
            border-radius: 24px;
            outline: none;
            filter: saturate(1.2);
        }

        /* =========================================================
           🎬 VIDEO PLAYER — Fullscreen con controles nativos
           ========================================================= */
        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-container video {
            width: 100%;
            max-height: 100vh;
            outline: none;
            background: #000;
        }

        /* =========================================================
           📄 PDF VIEWER — Google Docs Viewer (evita CSP de Drive)
           ========================================================= */
        .pdf-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* =========================================================
           ⚠️ ERROR
           ========================================================= */
        #error-screen {
            display: none;
            max-width: 420px;
            width: 90%;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        #error-screen h2 {
            color: var(--error-text);
            font-size: 1.15rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        #error-screen p {
            color: #e5a0a0;
            font-size: 0.88rem;
            line-height: 1.6;
        }

        /* =========================================================
           🟢 SISTEMA ACTIVO
           ========================================================= */
        .status-card {
            text-align: center;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px 36px;
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 90%;
        }

        .status-card h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .status-card p {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        /* =========================================================
           RESPONSIVE
           ========================================================= */
        @media (max-width: 480px) {
            .audio-card {
                padding: 28px 20px;
                border-radius: 22px;
            }
            .audio-art {
                width: 110px;
                height: 110px;
            }
            .top-bar h1 {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <!-- 1. PANTALLA DE CARGA -->
    <div id="loading-screen">
        <span class="spinner-ring"></span>
        <p id="loading-text">Conectando...</p>
    </div>

    <!-- 2. PANTALLA DEL REPRODUCTOR -->
    <div id="player-screen">
        <div class="top-bar">
            <h1 id="media-title"></h1>
        </div>
        <div class="media-wrapper" id="media-wrapper"></div>
    </div>

    <!-- 3. PANTALLA DE ERROR -->
    <div id="error-screen">
        <h2>⚠️ Error</h2>
        <p id="error-message"></p>
    </div>

    <script>
        // ── Configuración ──────────────────────────────────────────────
        const API_URL = "https://script.google.com/macros/s/AKfycbxj_SuZgyI5FywBKEcygWG9oOf-nGLjeRgsYoSu8i8-S-NRguWlhEyK-DiAlQC5Yv-A/exec";

        // ── UI helpers ─────────────────────────────────────────────────
        function showLoading()  { document.getElementById('loading-screen').style.display = 'flex'; }
        function hideLoading()  { document.getElementById('loading-screen').style.display = 'none'; }

        function showPlayer(nombre, tipo, fileId) {
            hideLoading();
            document.getElementById('media-title').textContent = nombre;
            const w = document.getElementById('media-wrapper');

            if (tipo.indexOf('audio') !== -1) {
                // ─── 🎵 AUDIO ─────────────────────────────────────────
                w.innerHTML = `
                    <div class="audio-card">
                        <div class="audio-art">
                            <div class="pulse-ring"></div>
                            <div class="pulse-ring"></div>
                            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                        </div>
                        <div class="audio-info">
                            <p class="label">Reproduciendo</p>
                            <p class="name">${nombre}</p>
                        </div>
                        <audio controls controlsList="nodownload noplaybackrate" autoplay>
                            <source src="https://drive.google.com/uc?export=download&id=${fileId}" type="audio/mpeg">
                        </audio>
                    </div>`;

            } else if (tipo.indexOf('video') !== -1) {
                // ─── 🎬 VIDEO (HTML5 nativo, sin iframe) ──────────────
                w.innerHTML = `
                    <div class="video-container">
                        <video controls controlsList="nodownload" disablePictureInPicture playsinline autoplay>
                            <source src="https://drive.google.com/uc?export=download&id=${fileId}" type="video/mp4">
                            Tu navegador no soporta la reproducción de video.
                        </video>
                    </div>`;

            } else if (tipo.indexOf('pdf') !== -1) {
                // ─── 📄 PDF (Google Docs Viewer — evita CSP de Drive) ─
                var encodedUrl = encodeURIComponent('https://drive.google.com/uc?export=download&id=' + fileId);
                w.innerHTML = `
                    <div class="pdf-container">
                        <iframe src="https://docs.google.com/gview?embedded=true&url=${encodedUrl}"></iframe>
                    </div>`;

            } else {
                // ─── Fallback ─────────────────────────────────────────
                var encodedUrl2 = encodeURIComponent('https://drive.google.com/uc?export=download&id=' + fileId);
                w.innerHTML = `
                    <div class="pdf-container">
                        <iframe src="https://docs.google.com/gview?embedded=true&url=${encodedUrl2}"></iframe>
                    </div>`;
            }

            document.getElementById('player-screen').style.display = 'flex';
        }

        function showError(msg) {
            hideLoading();
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-screen').style.display = 'block';
        }

        function showStatus() {
            hideLoading();
            document.body.innerHTML = `
                <div class="status-card">
                    <h1>Sistema Activo 🟢</h1>
                    <p>El visor multimedia IAR está funcionando correctamente.</p>
                </div>`;
        }

        // ── Bloquear atajos de guardado ────────────────────────────────
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p')) {
                e.preventDefault();
            }
        });

        // ── JSONP (sin CORS) ──────────────────────────────────────────
        function handleData(data) {
            if (data.error) {
                showError(data.error);
            } else if (data.fileId) {
                showPlayer(data.nombre || 'Contenido', data.tipo || '', data.fileId);
            } else {
                showError('Respuesta inválida del servidor.');
            }
        }

        function init() {
            var path = window.location.pathname;
            var codigo = path.substring(1).split('/')[0].split('?')[0];

            if (!codigo) {
                showStatus();
                return;
            }

            showLoading();

            var s = document.createElement('script');
            s.src = API_URL + '?id=' + encodeURIComponent(codigo) + '&callback=handleData';
            s.onerror = function() {
                showError('No se pudo conectar con la base de datos.');
            };
            document.head.appendChild(s);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>

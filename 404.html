<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IAR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        /* =========================================================
           MODO OSCURO + ACENTOS VERDE MUSGO
           ========================================================= */
        :root {
            --bg: #0b0f14;
            --bg-elevated: #141a22;
            --bg-surface: #1a222d;
            --text: #e2e8f0;
            --text-dim: #8896a8;
            --text-faint: #4a5568;
            --green: #4a7c59;
            --green-light: #6aad7a;
            --green-glow: rgba(74, 124, 89, 0.25);
            --border: rgba(255,255,255,0.06);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        /* ── Loader ────────────────────────────────────────────────── */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid var(--bg-surface);
            border-top-color: var(--green-light);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-text {
            color: var(--text-faint);
            font-size: 0.85rem;
        }

        /* ── Player Screen ─────────────────────────────────────────── */
        #player-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        /* Barra superior sutil */
        .top-bar {
            width: 100%;
            padding: 14px 20px 24px;
            background: linear-gradient(180deg, rgba(11,15,20,0.95) 0%, rgba(11,15,20,0.5) 70%, transparent 100%);
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            text-align: center;
        }

        .badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--green-light);
            border: 1px solid rgba(106,173,122,0.3);
            padding: 3px 12px;
            border-radius: 16px;
            margin-bottom: 6px;
        }

        .top-bar h1 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            line-height: 1.5;
            word-break: break-word;
        }

        /* Contenedor multimedia — TODOS usan iframe preview */
        .media-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
        }

        .media-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* Botón flotante verde "Abrir en Drive" */
        .open-btn {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 15;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            color: #fff;
            background: var(--green);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 16px var(--green-glow);
            transition: all 0.2s;
        }

        .open-btn:hover {
            background: var(--green-light);
            transform: translateY(-1px);
        }

        /* ── Error ─────────────────────────────────────────────────── */
        #error-screen {
            display: none;
            max-width: 400px;
            width: 88%;
            background: var(--bg-elevated);
            border: 1px solid rgba(220,80,80,0.2);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
        }

        #error-screen h2 {
            color: #e88;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        #error-screen p {
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* ── Status ────────────────────────────────────────────────── */
        .status-card {
            text-align: center;
            background: var(--bg-elevated);
            padding: 44px 34px;
            border-radius: 22px;
            border: 1px solid var(--border);
            max-width: 400px;
            width: 88%;
        }

        .status-card h1 { font-size: 1.4rem; margin-bottom: 8px; }
        .status-card p { color: var(--text-faint); font-size: 0.9rem; }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="loading-screen">
        <span class="spinner"></span>
        <p id="loading-text">Conectando...</p>
    </div>

    <div id="player-screen">
        <div class="top-bar">
            <span class="badge" id="media-badge"></span>
            <h1 id="media-title"></h1>
        </div>
        <div class="media-wrapper" id="media-wrapper"></div>
    </div>

    <div id="error-screen">
        <h2>⚠️ Error</h2>
        <p id="error-message"></p>
    </div>

    <script>
        var API_URL = "https://script.google.com/macros/s/AKfycbxj_SuZgyI5FywBKEcygWG9oOf-nGLjeRgsYoSu8i8-S-NRguWlhEyK-DiAlQC5Yv-A/exec";

        function showLoading() { document.getElementById('loading-screen').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loading-screen').style.display = 'none'; }

        function showPlayer(nombre, tipo, fileId) {
            hideLoading();
            document.getElementById('media-title').textContent = nombre;
            var badge = document.getElementById('media-badge');
            var w = document.getElementById('media-wrapper');

            // Detectar el tipo para el badge
            if (tipo.indexOf('audio') !== -1) {
                badge.textContent = '🎵 Audio';
            } else if (tipo.indexOf('video') !== -1) {
                badge.textContent = '🎬 Video';
            } else if (tipo.indexOf('pdf') !== -1) {
                badge.textContent = '📄 Documento';
            } else {
                badge.textContent = '📁 Archivo';
            }

            // TODOS los tipos usan Drive /preview (streaming nativo)
            // Es la misma técnica que funciona para video
            var previewUrl = 'https://drive.google.com/file/d/' + fileId + '/preview';
            var viewUrl = 'https://drive.google.com/file/d/' + fileId + '/view';

            w.innerHTML =
                '<iframe src="' + previewUrl + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>' +
                '<a class="open-btn" href="' + viewUrl + '" target="_blank" rel="noopener">↗ Abrir en Drive</a>';

            document.getElementById('player-screen').style.display = 'flex';
        }

        function showError(msg) {
            hideLoading();
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-screen').style.display = 'block';
        }

        function showStatus() {
            hideLoading();
            document.body.innerHTML =
                '<div class="status-card">' +
                    '<h1>Sistema Activo 🟢</h1>' +
                    '<p>El visor multimedia IAR está funcionando correctamente.</p>' +
                '</div>';
        }

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p')) e.preventDefault();
        });

        function handleData(data) {
            if (data.error) showError(data.error);
            else if (data.fileId) showPlayer(data.nombre || 'Contenido', data.tipo || '', data.fileId);
            else showError('Respuesta inválida.');
        }

        function init() {
            var codigo = window.location.pathname.substring(1).split('/')[0].split('?')[0];
            if (!codigo) { showStatus(); return; }
            showLoading();
            var s = document.createElement('script');
            s.src = API_URL + '?id=' + encodeURIComponent(codigo) + '&callback=handleData';
            s.onerror = function() { showError('No se pudo conectar.'); };
            document.head.appendChild(s);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>

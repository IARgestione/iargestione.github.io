<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IAR</title>
    <style>
        /* =========================================================
           VARIABLES Y RESET
           ========================================================= */
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --error-bg: #451a1a;
            --error-border: #f87171;
            --error-text: #fca5a5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* =========================================================
           LOADER (pantalla de carga)
           ========================================================= */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #334155;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* =========================================================
           REPRODUCTOR (oculto hasta que se cargan los datos)
           ========================================================= */
        #player-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        /* Barra superior con título */
        .top-bar {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            text-align: center;
        }

        .top-bar h1 {
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 0.3px;
            line-height: 1.4;
            padding: 0 10px;
            word-break: break-word;
        }

        /* Contenedor del medio embebido */
        .media-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        /* ─── IFRAME (Video y PDF vía /preview de Drive) ─── */
        .media-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* ─── AUDIO: Contenedor centrado con estilo ─── */
        .audio-player-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
        }

        .audio-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px var(--accent-glow);
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 30px var(--accent-glow); }
            50% { box-shadow: 0 8px 50px rgba(59, 130, 246, 0.45); }
        }

        .audio-icon svg {
            width: 56px;
            height: 56px;
            fill: white;
        }

        .audio-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            max-width: 350px;
            word-break: break-word;
        }

        audio {
            width: 90%;
            max-width: 400px;
            height: 54px;
            border-radius: 30px;
            outline: none;
        }

        audio::-webkit-media-controls-panel {
            background: var(--bg-card);
        }

        /* Capa anti-descarga en esquina izquierda del iframe de Drive */
        .overlay-blocker {
            position: absolute;
            top: 0;
            right: 0;
            width: 70px;
            height: 70px;
            z-index: 20;
            cursor: default;
        }

        /* =========================================================
           ERROR
           ========================================================= */
        #error-screen {
            display: none;
            max-width: 420px;
            width: 90%;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
        }

        #error-screen h2 {
            color: var(--error-text);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        #error-screen p {
            color: #f9a8a8;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* =========================================================
           SISTEMA ACTIVO (raíz sin código)
           ========================================================= */
        .status-card {
            text-align: center;
            background: var(--bg-card);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .status-card h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .status-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <!-- 1. PANTALLA DE CARGA -->
    <div id="loading-screen">
        <span class="spinner"></span>
        <p id="loading-text">Conectando con la base de datos...</p>
    </div>

    <!-- 2. PANTALLA DEL REPRODUCTOR -->
    <div id="player-screen">
        <div class="top-bar">
            <h1 id="media-title"></h1>
        </div>
        <div class="media-wrapper" id="media-wrapper">
            <!-- Se llena dinámicamente con JS -->
        </div>
    </div>

    <!-- 3. PANTALLA DE ERROR -->
    <div id="error-screen">
        <h2>⚠️ Error</h2>
        <p id="error-message"></p>
    </div>

    <script>
        // ── Configuración ──────────────────────────────────────────────
        const API_URL = "https://script.google.com/macros/s/AKfycbxj_SuZgyI5FywBKEcygWG9oOf-nGLjeRgsYoSu8i8-S-NRguWlhEyK-DiAlQC5Yv-A/exec";

        // ── Funciones de UI ────────────────────────────────────────────
        function showLoading()  { document.getElementById('loading-screen').style.display = 'flex'; }
        function hideLoading()  { document.getElementById('loading-screen').style.display = 'none'; }

        function showPlayer(nombre, tipo, fileId) {
            hideLoading();
            document.getElementById('media-title').textContent = nombre;
            const wrapper = document.getElementById('media-wrapper');

            if (tipo.indexOf('audio') !== -1) {
                // ─── AUDIO: reproductor HTML5 estilizado ───────────────
                wrapper.innerHTML = `
                    <div class="audio-player-box">
                        <div class="audio-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                        </div>
                        <p class="audio-title">${nombre}</p>
                        <audio controls controlsList="nodownload noplaybackrate">
                            <source src="https://drive.google.com/uc?export=download&id=${fileId}" type="audio/mpeg">
                        </audio>
                    </div>`;

            } else if (tipo.indexOf('video') !== -1) {
                // ─── VIDEO: iframe embebido de Drive /preview ──────────
                wrapper.innerHTML = `
                    <iframe src="https://drive.google.com/file/d/${fileId}/preview"
                            allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div class="overlay-blocker"></div>`;

            } else if (tipo.indexOf('pdf') !== -1) {
                // ─── PDF: iframe embebido de Drive /preview ────────────
                wrapper.innerHTML = `
                    <iframe src="https://drive.google.com/file/d/${fileId}/preview"
                            allow="autoplay"></iframe>
                    <div class="overlay-blocker"></div>`;

            } else {
                // ─── DESCONOCIDO: fallback al preview genérico ─────────
                wrapper.innerHTML = `
                    <iframe src="https://drive.google.com/file/d/${fileId}/preview"
                            allow="autoplay"></iframe>
                    <div class="overlay-blocker"></div>`;
            }

            document.getElementById('player-screen').style.display = 'flex';
        }

        function showError(msg) {
            hideLoading();
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-screen').style.display = 'block';
        }

        function showStatus() {
            hideLoading();
            document.body.innerHTML = `
                <div class="status-card">
                    <h1>Sistema Activo 🟢</h1>
                    <p>El visor multimedia IAR está funcionando correctamente.</p>
                </div>`;
        }

        // ── Bloquear Ctrl+S / Ctrl+P ──────────────────────────────────
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p')) {
                e.preventDefault();
            }
        });

        // ── Lógica principal (usa JSONP para evitar CORS) ─────────────
        // Callback global que Apps Script invocará automáticamente
        function handleData(data) {
            if (data.error) {
                showError(data.error);
            } else if (data.fileId) {
                showPlayer(data.nombre || 'Contenido', data.tipo || '', data.fileId);
            } else {
                showError('La respuesta del servidor no contiene datos válidos.');
            }
        }

        function init() {
            const path = window.location.pathname;
            const codigo = path.substring(1).split('/')[0].split('?')[0];

            if (!codigo) {
                showStatus();
                return;
            }

            showLoading();

            // Inyectar un <script> con callback=handleData → sin CORS
            var s = document.createElement('script');
            s.src = API_URL + '?id=' + encodeURIComponent(codigo) + '&callback=handleData';
            s.onerror = function() {
                showError('No se pudo conectar con la base de datos. Intenta de nuevo.');
            };
            document.head.appendChild(s);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
